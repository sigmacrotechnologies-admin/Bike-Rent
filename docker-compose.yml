version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: velocity_mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: velocity_rent
    volumes:
      - mongodb_data:/data/db
    networks:
      - velocity_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/velocity_rent --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: velocity_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - velocity_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: velocity_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/velocity_rent
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - velocity_network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: velocity_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://backend:5000
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - velocity_network

  nginx:
    image: nginx:alpine
    container_name: velocity_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - backend
    networks:
      - velocity_network

volumes:
  mongodb_data:
  redis_data:

networks:
  velocity_network:
    driver: bridge
